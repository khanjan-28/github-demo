<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> 3D Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Particle Canvas -->
  <canvas id="particles"></canvas>

  <!-- 3D Cube -->
  <div class="scene">
    <div class="cube">
      <div class="face front">GitHub</div>
      <div class="face back">Demo</div>
      <div class="face right">3D</div>
      <div class="face left">Cool</div>
      <div class="face top">🚀</div>
      <div class="face bottom">🔥</div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <h1 id="text">Welcome to ultra-Level UI</h1>
    <button onclick="changeText()">Enter</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
